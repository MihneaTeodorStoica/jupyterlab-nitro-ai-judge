name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm install

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip build twine hatchling hatch-jupyter-builder jupyterlab

      - name: Build package
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*
